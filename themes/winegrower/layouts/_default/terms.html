{{ define "main" }}
<div class="post-list-container post-list-container-shadow">
  <div class="post-item-wrapper post-item-wrapper-no-hover">
    <div class="post-item post-item-no-gaps">
      <div class="post-item-info-wrapper">
        <div class="post-item-title post-item-title-small">
          {{ .Title }}
        </div>
      </div>
    </div>
  </div>
  {{ if eq .Data.Plural "tags" }}
  <h3 style="margin: 16px 0 8px 0; font-size: 14px; color: var(--text-secondary);">分类</h3>
  <div class="tags" style="margin-bottom: 24px;">
    {{ range sort .Site.Taxonomies.categories.ByCount "Count" "desc" }}
    <div class="tag">
      <a href="{{ .Page.RelPermalink }}" class="btn btn-outline-secondary position-relative rounded-pill">
        {{ .Page.Title }}
        <span class="badge">({{ .Count }})</span>
      </a>
    </div>
    {{ end }}
  </div>
  <h3 style="margin: 16px 0 8px 0; font-size: 14px; color: var(--text-secondary);">标签</h3>
  {{ end }}
  <div class="tags">
    {{ range sort .Data.Terms "Count" "desc" }}
    <div class="tag">
      <a href="{{ .Page.RelPermalink }}" class="btn btn-outline-secondary position-relative rounded-pill">
        {{ .Page.Title }}
        <span class="badge">({{ .Count }})</span>
      </a>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
