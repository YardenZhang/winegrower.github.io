<div id="waline" class="waline-container" style="position:relative;"></div>
<style>
.wl-rss { display: none !important; }
</style>

<script type="module">
import { init } from 'https://cdn.jsdelivr.net/npm/@waline/client@3/dist/waline.js';

// 从 localStorage 读取主题
var saved = localStorage.getItem('theme');
var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
var isDark = saved === 'dark' || (saved !== 'light' && prefersDark);

init({
    el: '#waline',
    serverURL: '{{ .Site.Params.walineServer | default "https://c.winegrower.cn" }}',
    lang: 'zh-CN',
    dark: 'body.night',
    emoji: ['https://unpkg.com/@waline/emojis@1.2.0/tw-emoji'],
    requiredMeta: ['nick', 'mail'],
    meta: ['nick', 'mail', 'link'],
    login: 'enable',
    pageSize: 20,
    reaction: false,
});
</script>
