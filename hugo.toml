baseURL = "https://winegrower.cn/"
languageCode = "zh-CN"
title = "winegrower"
theme = "winegrower"

[params]
  subtitle = "种葡萄并酿酒的人"
  description = "种葡萄并酿酒的人"
  enableOpenGraph = true
  enableTwitterCards = true
  disableDarkmode = false
  favicon = "/favicon.ico"
  startYear = "2008"
  sidebarQuote = "种葡萄并酿酒的人"
  enableReadingTime = true
  walineServer = "https://c.winegrower.cn"

  avatar = "/logo.png"
  email = "wineshe@qq.com"
  github = "https://github.com/YardenZhang"

  [params.author]
    name = "winegrower"
    email = "wineshe@qq.com"

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"

[permalinks]
  posts = "/posts/:slug/"
  categories = "/categories/:slug/"
  tags = "/tags/:slug/"

[[menu.main]]
  url = "/posts"
  name = "日志归档"
  weight = 1

[[menu.main]]
  url = "/about/"
  name = "关于博主"
  weight = 2

[[menu.main]]
  url = "/tags"
  name = "博客标签"
  weight = 3

[[menu.main]]
  url = "/links"
  name = "友情链接"
  weight = 4
